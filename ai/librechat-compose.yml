# LibreChat stack for Moqui AI development and testing.
# Provides the chat UI accessible through the Moqui proxy at /librechat/*.
#
# Start:
#   docker compose -f ai/librechat-compose.yml -p moqui-ai up -d
#
# Stop:
#   docker compose -f ai/librechat-compose.yml -p moqui-ai down
#
# Follow logs:
#   docker compose -f ai/librechat-compose.yml -p moqui-ai logs -f moqui-librechat
#
# Moqui proxy config (defaults already set in moqui-mcp MoquiConf.xml):
#   librechat_host=127.0.0.1
#   librechat_port=3080
#
# LibreChat direct (bypass Moqui proxy):
#   http://127.0.0.1:3080
#
# LibreChat through Moqui proxy (requires LibreChatRemote permission):
#   http://localhost:8080/librechat/
#
# LibreChat screen in Moqui UI:
#   http://localhost:8080/LibreChat
#
# MCP connection from LibreChat to Moqui:
#   See ai/librechat/librechat.yaml for mcpServers config.
#   Uses host.docker.internal to reach Moqui running on the host.

services:
  moqui-librechat:
    image: ghcr.io/danny-avila/librechat:latest
    container_name: moqui-librechat
    restart: unless-stopped
    depends_on:
      moqui-librechat-db:
        condition: service_healthy
    ports:
      - 127.0.0.1:3080:3080
    volumes:
      - ./librechat/librechat.yaml:/app/librechat.yaml:ro
      - ./librechat/images:/app/client/public/images
      - ./librechat/logs:/app/api/logs
    extra_hosts:
      # allows LibreChat inside Docker to reach Moqui running on the host
      - "host.docker.internal:host-gateway"
    environment:
      - HOST=0.0.0.0
      - PORT=3080
      - MONGO_URI=mongodb://moqui-librechat-db:27017/LibreChat
      - JWT_SECRET=${LIBRECHAT_JWT_SECRET:-moqui-librechat-jwt-dev-secret-changeme}
      - JWT_REFRESH_SECRET=${LIBRECHAT_JWT_REFRESH_SECRET:-moqui-librechat-refresh-dev-secret-changeme}
      - ALLOW_EMAIL_LOGIN=true
      - ALLOW_REGISTRATION=true
      - SESSION_EXPIRY=900000
      - REFRESH_TOKEN_EXPIRY=604800000
      - NO_INDEX=true
      - APP_BASE_PATH=/librechat
      # Set OPENAI_API_KEY in the host shell or in a .env file next to this compose file.
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Prevent LibreChat from treating Moqui's plain 401 (no Bearer challenge) as OAuth-required.
      # The OAuth detection probe runs without admin headers, so Moqui's 401 would otherwise
      # flip requiresOAuth=true and skip the admin Basic auth header entirely.
      - MCP_OAUTH_ON_AUTH_ERROR=false
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3080/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  moqui-librechat-db:
    image: mongo:7
    container_name: moqui-librechat-db
    restart: unless-stopped
    ports:
      - 127.0.0.1:27017:27017
    volumes:
      - ./librechat/db:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

networks:
  default:
    name: moqui_default
