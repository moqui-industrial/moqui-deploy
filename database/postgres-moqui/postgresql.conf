# PostgreSQL configuration for the Moqui production database.
# VM role: Moqui application + production PostgreSQL.

# -----------------------------------------------------------------------------
# Network / locale
# -----------------------------------------------------------------------------
listen_addresses = '*'
timezone = 'UTC'
log_timezone = 'UTC'

# -----------------------------------------------------------------------------
# Connections
# -----------------------------------------------------------------------------
# Moqui standard configuration may use pool-maxsize=90. Keep PostgreSQL above
# that value to leave room for psql, backup checks, maintenance and diagnostics.
max_connections = 120
superuser_reserved_connections = 3

# If XA / two-phase transactions are used by the application server, PostgreSQL
# must allow prepared transactions. Keep this aligned with max_connections.
max_prepared_transactions = 120

# -----------------------------------------------------------------------------
# Memory
# -----------------------------------------------------------------------------
# Conservative values for a 6 GB DB container. Do not over-allocate work_mem:
# it may be consumed by many sessions at the same time.
shared_buffers = 1GB
effective_cache_size = 4GB
maintenance_work_mem = 512MB
work_mem = 16MB

# -----------------------------------------------------------------------------
# WAL / pgBackRest / Point-in-Time Recovery
# -----------------------------------------------------------------------------
wal_level = replica
archive_mode = on
archive_command = 'pgbackrest --stanza=moqui-prod archive-push %p'
archive_timeout = 300
max_wal_senders = 3
wal_keep_size = 1GB
wal_compression = on

# Keep checkpoints reasonably spaced to reduce I/O spikes.
checkpoint_timeout = 15min
max_wal_size = 4GB
min_wal_size = 1GB
checkpoint_completion_target = 0.9

# -----------------------------------------------------------------------------
# Query planner / storage
# -----------------------------------------------------------------------------
random_page_cost = 1.1
effective_io_concurrency = 100

# -----------------------------------------------------------------------------
# Parallelism / workers
# -----------------------------------------------------------------------------
max_worker_processes = 8
max_parallel_workers = 4
max_parallel_workers_per_gather = 2

# -----------------------------------------------------------------------------
# Logging useful for production diagnostics
# -----------------------------------------------------------------------------
log_min_duration_statement = 5000
log_checkpoints = on
log_lock_waits = on
log_temp_files = 0

# -----------------------------------------------------------------------------
# Safety / durability
# -----------------------------------------------------------------------------
synchronous_commit = on
full_page_writes = on
fsync = on

# Avoid sessions left open in transaction forever. Tune only if a verified
# application transaction legitimately needs longer idle time.
idle_in_transaction_session_timeout = '10min'
