# pgBackRest configuration for VM 1: Moqui production database.
# Retention policy: keep the latest 2 full backup chains.
# Differential and incremental backups are retained only within active chains.

[global]
repo1-path=/var/lib/pgbackrest
repo1-retention-full=2
repo1-retention-diff=1
start-fast=y
process-max=4
compress-type=gz
compress-level=3
log-level-console=info
log-level-file=off

[moqui-prod]
pg1-path=/var/lib/postgresql/18/docker
pg1-user=moqui
