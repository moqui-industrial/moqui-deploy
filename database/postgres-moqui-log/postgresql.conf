# PostgreSQL + TimescaleDB configuration for the Moqui telemetry database.
# VM role: telemetry database only.

# -----------------------------------------------------------------------------
# Network / locale
# -----------------------------------------------------------------------------
listen_addresses = '*'
timezone = 'UTC'
log_timezone = 'UTC'

# -----------------------------------------------------------------------------
# Connections
# -----------------------------------------------------------------------------
max_connections = 120
superuser_reserved_connections = 3

# Keep enabled for compatibility with XA / two-phase transactions if the same
# Moqui transaction manager is used against this database.
max_prepared_transactions = 120

# -----------------------------------------------------------------------------
# Memory
# -----------------------------------------------------------------------------
# TimescaleDB/write-heavy workload. Values assume a 16 GB DB container.
shared_buffers = 4GB
effective_cache_size = 12GB
maintenance_work_mem = 1GB
work_mem = 32MB

# -----------------------------------------------------------------------------
# TimescaleDB
# -----------------------------------------------------------------------------
shared_preload_libraries = 'timescaledb'

# Background workers for compression, retention policies and TimescaleDB jobs.
# Keep this aligned with max_worker_processes.
timescaledb.max_background_workers = 8
max_worker_processes = 16
max_parallel_workers = 8
max_parallel_workers_per_gather = 2

# -----------------------------------------------------------------------------
# WAL / pgBackRest / Point-in-Time Recovery
# -----------------------------------------------------------------------------
wal_level = replica
archive_mode = on
archive_command = 'pgbackrest --stanza=moqui-log archive-push %p'
archive_timeout = 900
max_wal_senders = 3
wal_keep_size = 2GB
wal_compression = on
checkpoint_timeout = 15min
max_wal_size = 16GB
min_wal_size = 4GB
checkpoint_completion_target = 0.9

# -----------------------------------------------------------------------------
# Query planner / storage
# -----------------------------------------------------------------------------
random_page_cost = 1.1
effective_io_concurrency = 200

# -----------------------------------------------------------------------------
# Logging useful for production diagnostics
# -----------------------------------------------------------------------------
log_min_duration_statement = 10000
log_checkpoints = on
log_lock_waits = on
log_temp_files = 0

# -----------------------------------------------------------------------------
# Safety / durability
# -----------------------------------------------------------------------------
synchronous_commit = on
full_page_writes = on
fsync = on

# Avoid sessions left open in transaction forever.
idle_in_transaction_session_timeout = '10min'
